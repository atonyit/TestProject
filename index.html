<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>GuideStone Division Calculator</title>
		<link rel="stylesheet" href="styles.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
		/>
	</head>
	<body>
		<div id="tooltip">
			<i class="fa fa-info-circle" style="font-size: 20px"></i>
			<span id="tooltiptext"
				>To reset inputs, double click or press escape!</span
			>
		</div>
		<div id="calculator">
			<h2>Division Calculator</h2>

			<label for="inputOne">Number 1</label>
			<input type="number" id="inputOne" placeholder="ex. 10..." />
			<label for="inputTwo">Number 2</label>
			<input type="number" id="inputTwo" placeholder="ex. 2..." />

			<h4 id="result"></h4>
			<p id="error"></p>

			<button id="calculateButton">Calculate</button>

			<button id="clearButton" disabled>Clear All</button>
			<p id="emptyHistory">No calculations yet.</p>
			<ul id="historyList"></ul>
		</div>

		<script src="index.js"></script>
	</body>
</html>
